name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        env:
          HOIKUICT_ENV: development
          HOIKUICT_ENABLE_MOCK_AUTH: "1"
          HOIKUICT_KIOSK_ACCESS_MODE: open
        run: python -m pytest -q --ignore=gen_bunnrei
