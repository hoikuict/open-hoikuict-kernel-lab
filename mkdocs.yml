repo_name: hoikuict/open-hoikuict
repo_url: https://github.com/hoikuict/open-hoikuict
edit_uri: edit/main/docs/
site_name: open.hoikuict.net | 保育園のためのICT・GAS運用オープンガイド
site_url: https://open.hoikuict.net/
site_description: 保育園職員による、保育現場のためのICT化ノウハウ共有サイト。
theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
extra_css:
  - stylesheets/extra.css
plugins:
  - search
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
nav:
  - はじめに: index.md
  - 導入ロードマップ: roadmap.md
  - 開発者向け: development.md
  - 運用責任: operations.md
  - セキュリティ最低ライン: security.md
  - 個人情報とダミーデータ: privacy.md
  - デモデータ: demo-data.md
  - 園内運用テンプレ: templates.md
  - リリース前チェック: release-checklist.md
  - ライセンス: license.md
  - FAQ: faq.md
