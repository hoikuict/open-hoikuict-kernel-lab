<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}カレンダー | open-hoikuict{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    body { background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%); }
    .calendar-scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
    .calendar-scrollbar::-webkit-scrollbar-thumb { background: rgba(100, 116, 139, 0.35); border-radius: 999px; }
  </style>
  {% block head %}{% endblock %}
  <meta name="csrf-token" content="{{ request.state.csrf_token if request is defined and request and request.state.csrf_token is defined else '' }}">
</head>
<body class="min-h-screen text-slate-900">
  <header class="border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6">
      <div>
        <a href="/calendar" class="text-xl font-semibold tracking-tight text-slate-900">open-hoikuict カレンダー</a>
      </div>
      <div class="flex items-center gap-3">
        <a href="/" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">
          トップへ戻る
        </a>
        {% if current_user %}
        <div class="text-right">
          <p class="text-sm font-medium text-slate-800">{{ current_user.display_name }}</p>
          <p class="text-xs text-slate-500">{{ current_user.email }}</p>
          <p class="text-xs font-medium text-slate-500">カレンダー権限: {{ current_user.calendar_role_label }}</p>
        </div>
        <form method="post" action="/staff/logout">
          <input type="hidden" name="redirect_to" value="/staff/login">
          <button type="submit" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">
            ログアウト
          </button>
        </form>
        {% endif %}
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
  <script>
    (() => {
      const token = document.querySelector('meta[name="csrf-token"]')?.content || "";
      const addToken = (root) => {
        const selector = 'form[method="post" i], form[method="put" i], form[method="patch" i], form[method="delete" i]';
        const forms = [...(root.querySelectorAll?.(selector) || [])];
        if (root.matches?.(selector)) forms.push(root);
        forms.forEach((form) => {
          if (!form.querySelector('input[name="csrf_token"]')) {
            const input = document.createElement("input");
            input.type = "hidden";
            input.name = "csrf_token";
            input.value = token;
            form.appendChild(input);
          }
        });
      };
      addToken(document);
      new MutationObserver((records) => records.forEach((record) => record.addedNodes.forEach((node) => {
        if (node.nodeType === Node.ELEMENT_NODE) addToken(node);
      }))).observe(document.documentElement, { childList: true, subtree: true });
      document.body.addEventListener("htmx:configRequest", (event) => {
        event.detail.headers["X-CSRF-Token"] = token;
      });
    })();
  </script>
</body>
</html>
